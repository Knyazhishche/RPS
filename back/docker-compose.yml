services:
  postgres:
    image: postgres:16-alpine
    container_name: rps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rps
      POSTGRES_USER: rps
      POSTGRES_PASSWORD: rps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rps -d rps"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rps-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rps-api
    restart: unless-stopped
    command: sh -c "npm run prisma:deploy && node dist/main.js"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rps:rps@postgres:5432/rps
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rps-worker
    restart: unless-stopped
    command: node dist/worker.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rps:rps@postgres:5432/rps
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
